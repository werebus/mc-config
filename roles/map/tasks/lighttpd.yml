---
- name: 'Install Lighttpd'
  apt:
    pkg:
      - lighttpd
      - lighttpd-mod-magnet
- name: 'Allow http in'
  ufw:
    rule: allow
    port: http
- name: 'Allow https in'
  ufw:
    rule: allow
    port: https
- name: 'Lighttpd config'
  template:
    src: lighttpd.conf.j2
    dest: /etc/lighttpd/lighttpd.conf
  notify:
    - restart lighttpd
- name: 'Bluemap request magnet'
  copy:
    src: bluemap.lua
    dest: /etc/lighttpd/bluemap.lua
  notify:
    - restart lighttpd
